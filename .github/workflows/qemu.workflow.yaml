name: qemu-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    start-stop-test:
#        container: cuaesd/aesd-autotest:24-assignment7-buildroot
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Checkout submodules
            run: git submodule update --init --recursive
          - name: Build image
            run: ./test/validate.sh build
          - name: Start image
            run: ./test/validate.sh start
          - name: Stop image
            run: ./test/validate.sh stop
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
