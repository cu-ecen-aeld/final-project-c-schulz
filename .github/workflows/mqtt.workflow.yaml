name: mqtt-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    pub-sub-test:
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Build mqtt subscriber
            run: ./tests/validate_mqtt.sh build
          - name: Start mqtt subscriber
            run: ./tests/validate_mqtt.sh start
          - name: Run publish-subscribe test
            run: ./tests/validate_mqtt.sh pub-sub
          - name: Stop mqtt subscriber
            run: ./tests/validate_mqtt.sh stop